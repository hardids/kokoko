<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리움한방네트워크 | 가맹 및 파트너십 안내</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FAF6F1;
            --deep: #2C2420;
            --gold: #B8966E;
            --divider: #E8DDD5;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--cream); 
            font-family: 'Noto Sans KR', sans-serif; 
            color: var(--deep);
            line-height: 1.6;
        }

        /* Nav */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(250,246,241,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--divider);
        }
        .nav-logo {
            font-family: 'Noto Serif KR', serif;
            font-size: 18px; font-weight: 600; color: var(--deep);
            text-decoration: none;
        }
        .nav-logo span { color: var(--gold); }
        .nav-cta {
            padding: 8px 20px; background: var(--deep); color: var(--cream);
            font-size: 13px; border: none; cursor: pointer; transition: 0.3s;
            text-decoration: none;
        }
        .nav-cta:hover { background: var(--gold); }

        /* Main Content */
        main { padding-top: 60px; } /* nav 높이만큼 여백 */

        .img-section {
            width: 100%;
            display: flex;
            justify-content: center;
            background-color: var(--white);
            overflow: hidden;
        }

        /* 이미지 반응형 처리 */
        .img-section img {
            width: 100%;
            max-width: 1200px; /* 데스크탑에서 너무 커지지 않게 제한 */
            height: auto;
            display: block;
            /* 부드러운 등장 효과 */
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }

        .img-section img.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 배경색 교차 배치 (지루함 방지) */
        .img-section:nth-child(even) { background-color: var(--cream); }

        /* 하단 고정 문의 바 (모바일 대응) */
        .mobile-contact-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: grid; grid-template-columns: 1fr 1fr;
            z-index: 100;
        }
        .mobile-contact-bar a {
            padding: 18px; text-align: center; text-decoration: none;
            font-size: 14px; font-weight: 500;
        }
        .btn-call { background: var(--gold); color: white; }
        .btn-mail { background: var(--deep); color: white; }

        @media (min-width: 769px) {
            .mobile-contact-bar { display: none; }
        }

        footer {
            padding: 60px 5% 100px;
            text-align: center;
            background: var(--cream);
            border-top: 1px solid var(--divider);
            font-size: 13px; color: #9A8880;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">리움<span>한방네트워크</span></a>
    <a href="mailto:oper2068@kakao.com" class="nav-cta">가맹 상담 문의</a>
</nav>

<main>
    <section class="img-section"><img src="1.jpg" alt="01 리움 다시 움트다"></section>
    <section class="img-section"><img src="2.jpg" alt="02 브랜드 아이덴티티1"></section>
    <section class="img-section"><img src="3.jpg" alt="02 브랜드 아이덴티티2"></section>
    <section class="img-section"><img src="4.jpg" alt="03 특별한 강점"></section>
    <section class="img-section"><img src="5.jpg" alt="인프라 지원"></section>
    <section class="img-section"><img src="6.jpg" alt="04 지원 시스템"></section>
    <section class="img-section" style="padding-bottom: 50px;"><img src="7.jpg" alt="05 파트너십 문의"></section>
</main>

<footer>
    <p>© 2026 RE:UM ORIENTAL MEDICAL NETWORK. All rights reserved.</p>
    <p style="margin-top:10px;">가맹문의: 010-2922-1245 | oper2068@kakao.com</p>
</footer>

<div class="mobile-contact-bar">
    <a href="tel:010-2922-1245" class="btn-call">전화 상담</a>
    <a href="mailto:oper2068@kakao.com" class="btn-mail">메일 문의</a>
</div>

<script>
    // 스크롤 시 이미지가 스르륵 나타나는 효과
    const observerOptions = { threshold: 0.1 };
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, observerOptions);

    document.querySelectorAll('.img-section img').forEach(img => observer.observe(img));
</script>

</body>
</html>
